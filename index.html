<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labour Finder</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f6fa;
}

.header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

.categories{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.category{
background:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.category:hover{
background:#0d6efd;
color:white;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
display:flex;
gap:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:70px;
height:70px;
border-radius:10px;
}

.card-title{
font-size:18px;
font-weight:bold;
}

.apply-btn{
background:#0d6efd;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
margin-top:5px;
cursor:pointer;
}

.applied{
background:green;
}

</style>

</head>

<body>

<div class="header">
Labour Finder
</div>

<div class="search">
<input type="text" placeholder="Search Labour or Work">
</div>

<div class="categories">
<div class="category" onclick="showJobs('mason')">Mason</div>
<div class="category" onclick="showJobs('electrician')">Electrician</div>
<div class="category" onclick="showJobs('plumber')">Plumber</div>
<div class="category" onclick="showJobs('painter')">Painter</div>
<div class="category" onclick="showJobs('carpenter')">Carpenter</div>
</div>

<div class="container" id="jobs">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
<div>
<div class="card-title">Select Category</div>
<div>Click above to see opportunities</div>
</div>
</div>

</div>

<script>

function apply(btn){
btn.innerText="Applied ✓";
btn.classList.add("applied");
btn.disabled=true;

alert("Application Submitted Successfully");
}

function showJobs(type){

let jobs = document.getElementById("jobs");

if(type=="mason"){
jobs.innerHTML=`

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
<div>
<div class="card-title">House Construction</div>
<div>5 Workers Required</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
<div>
<div class="card-title">Wall Repair</div>
<div>2 Workers Needed</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

`;
}

if(type=="electrician"){
jobs.innerHTML=`

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">
<div>
<div class="card-title">House Wiring</div>
<div>Electrician Required</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">
<div>
<div class="card-title">Office Setup</div>
<div>3 Electricians</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

`;
}

if(type=="plumber"){
jobs.innerHTML=`

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png">
<div>
<div class="card-title">Pipe Installation</div>
<div>Plumber Needed</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png">
<div>
<div class="card-title">Bathroom Repair</div>
<div>Urgent Work</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

`;
}

if(type=="painter"){
jobs.innerHTML=`

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png">
<div>
<div class="card-title">House Paint</div>
<div>Painter Required</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

`;
}

if(type=="carpenter"){
jobs.innerHTML=`

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png">
<div>
<div class="card-title">Furniture Work</div>
<div>Carpenter Needed</div>
<button class="apply-btn" onclick="apply(this)">Apply</button>
</div>
</div>

`;
}

}

</script>

</body>
</html>
